name: ripgrep
description: ripgrep recursively searches directories for a regex pattern while respecting your gitignore.
homepage: https://github.com/BurntSushi/ripgrep
licenses:
  - MIT
  - Unlicense
languages:
  - Rust
categories: []

source:
  id: pkg:github/BurntSushi/ripgrep@15.1.0
  asset:
    - target: darwin_x64
      file: ripgrep-{{ version }}-x86_64-apple-darwin.tar.gz
      bin: ripgrep-{{ version }}-x86_64-apple-darwin/rg
    - target: darwin_arm64
      file: ripgrep-{{ version }}-aarch64-apple-darwin.tar.gz
      bin: ripgrep-{{ version }}-aarch64-apple-darwin/rg
    - target: linux_x64
      file: ripgrep-{{ version }}-x86_64-unknown-linux-musl.tar.gz
      bin: ripgrep-{{ version }}-x86_64-unknown-linux-musl/rg
    - target: linux_arm64
      file: ripgrep-{{ version }}-aarch64-unknown-linux-gnu.tar.gz
      bin: ripgrep-{{ version }}-aarch64-unknown-linux-gnu/rg
    - target: win_x64
      file: ripgrep-{{ version }}-x86_64-pc-windows-msvc.zip
      bin: ripgrep-{{ version }}-x86_64-pc-windows-msvc/rg.exe
    - target: win_arm64
      file: ripgrep-{{ version }}-aarch64-pc-windows-msvc.zip
      bin: ripgrep-{{ version }}-aarch64-pc-windows-msvc/rg.exe
    - target: win_x86
      file: ripgrep-{{ version }}-i686-pc-windows-msvc.zip
      bin: ripgrep-{{ version }}-i686-pc-windows-msvc/rg.exe

bin:
  rg: "{{source.asset.bin}}"
